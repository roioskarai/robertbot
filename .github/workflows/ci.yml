# CI — runs the full verification ladder on every push/PR.
# All jobs run with PLACEHOLDER keys, so demo mode is what CI exercises —
# a demo-mode break fails the pipeline, not a human check.
name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: app

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
  SUPABASE_SERVICE_ROLE_KEY: placeholder

jobs:
  verify:
    name: tsc · lint · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests (Vitest)
        run: npm run test
      - name: Build
        run: npm run build

  e2e:
    name: Playwright smoke (demo mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Smoke tests
        run: npm run test:e2e
      - name: Upload baseline screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-baseline
          path: app/e2e/baseline/
          if-no-files-found: ignore
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: app/test-results/
          if-no-files-found: ignore
